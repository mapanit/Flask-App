services:
  vulnerable-app:
    build: .
    container_name: flask-vulnerable-app
    ports:
      - "5012:5012"
    volumes:
      - ./uploads:/app/uploads
      - ./database.db:/app/database.db  # Убедитесь, что файл существует
      - ./static:/app/static
    environment:
      - FLASK_ENV=production
      - FLASK_APP=main.py
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: flask-nginx
    ports:
      - "8080:80"  # Изменено с 80:80 на 8080:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/app/uploads:ro
      - ./static:/app/static:ro
    depends_on:
      - vulnerable-app
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
