version: '3.8'

services:
  vulnerable-app:
    build: .
    container_name: flask-vulnerable-app
    ports:
      - "5012:5012"
    volumes:
      - ./uploads:/app/uploads
      - ./database.db:/app/database.db
      - ./static:/app/static
    environment:
      - FLASK_ENV=production
      - FLASK_APP=main.py
    networks:
      - app-network
    restart: unless-stopped
    expose:
      - "5012"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5012/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: flask-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/app/uploads:ro
      - ./static:/app/static:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - vulnerable-app
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  nginx-logs:
    driver: local

networks:
  app-network:
    driver: bridge
